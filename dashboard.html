<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - Controle de Banheiro</title>
    <link rel="stylesheet" href="css/style.css?v=2.1">
</head>

<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1>Estatísticas Diárias</h1>
                <div>
                    <a href="admin.html" class="nav-action">Trocar Turma</a>
                    <a href="#" onclick="fazerLogout()" class="nav-action nav-action-danger">Sair</a>
                </div>
            </div>
            <nav id="mainNav">
                <a href="index.html" class="nav-link" data-target="index.html">Início</a>
                <a href="dashboard.html" class="nav-link" data-target="dashboard.html">Estatísticas</a>
                <a href="calendario.html" class="nav-link" data-target="calendario.html">Histórico</a>
            </nav>
        </header>

        <main>
            <div class="dashboard-grid">
                <div class="kpi-card">
                    <h3>Total de Saídas</h3>
                    <p id="totalSaidas">0</p>
                </div>
                <div class="kpi-card">
                    <h3>Alunos Distintos</h3>
                    <p id="totalAlunos">0</p>
                </div>
                <div class="kpi-card">
                    <h3>Tempo Médio</h3>
                    <p id="tempoMedio">0m</p>
                </div>
                <div class="kpi-card">
                    <h3>Tempo Total</h3>
                    <p id="tempoTotal">0m</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h2>Frequência (Vezes no dia)</h2>
                    <div id="frequenciaArea">Carregando...</div>
                </div>

                <div class="card">
                    <h2>Top Demorados (Total do Dia)</h2>
                    <div id="rankingArea">Carregando...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = window.location.search;
            if (params) {
                document.querySelectorAll('.nav-link').forEach(link => {
                    const target = link.getAttribute('data-target');
                    link.href = `${target}${params}`;
                });
            }
        });

        async function fazerLogout() {
            try {
                await fetch('api/logout.php');
                window.location.href = 'login.html';
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>

</html>
